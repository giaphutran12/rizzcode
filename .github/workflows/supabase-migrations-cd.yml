name: Supabase Migrations CD

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrations-ci.yml"
      - ".github/workflows/supabase-migrations-cd.yml"
  workflow_dispatch:

concurrency:
  group: supabase-migrations-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  supabase-db-push:
    name: Supabase db push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.84.2

      - name: Assert required secrets exist
        shell: bash
        run: |
          set -euo pipefail
          for var in SUPABASE_ACCESS_TOKEN SUPABASE_DB_PASSWORD SUPABASE_PROJECT_REF; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Missing required GitHub Actions secret: ${var}"
              exit 1
            fi
          done

      - name: Link production project
        run: >-
          supabase link
          --project-ref "$SUPABASE_PROJECT_REF"
          --password "$SUPABASE_DB_PASSWORD"
          --yes

      - name: Log migration history before apply
        run: supabase migration list --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Apply committed migrations
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Verify migration history after apply
        run: supabase migration list --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Write workflow summary
        if: always()
        run: |
          {
            echo "## Supabase migration CD"
            echo
            echo "- Target ref: \`$SUPABASE_PROJECT_REF\`"
            echo "- Logged migration history before and after apply"
            echo "- Applied committed migrations with \`supabase db push\`"
            echo
            echo "No developer machine or agent applied the migration."
          } >> "$GITHUB_STEP_SUMMARY"
