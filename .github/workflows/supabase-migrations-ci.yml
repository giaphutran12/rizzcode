name: Supabase Migrations CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: supabase-migrations-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  supabase-migration-dry-run:
    name: Supabase migration dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.84.2

      - name: Assert required secrets exist
        shell: bash
        run: |
          set -euo pipefail
          for var in SUPABASE_ACCESS_TOKEN SUPABASE_DB_PASSWORD SUPABASE_PROJECT_REF; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Missing required GitHub Actions secret: ${var}"
              exit 1
            fi
          done

      - name: Validate migration version IDs
        run: npm run check:migrations

      - name: Reject UTF-8 BOM bytes
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          bad_files=()
          for file in supabase/migrations/*.sql; do
            first_three_bytes=$(head -c 3 "$file" | od -An -tx1 | tr -d ' \n')
            if [ "$first_three_bytes" = "efbbbf" ]; then
              bad_files+=("$file")
            fi
          done
          if [ ${#bad_files[@]} -gt 0 ]; then
            echo "::error::UTF-8 BOM found in migration files:"
            printf '  - %s\n' "${bad_files[@]}"
            exit 1
          fi

      - name: Link Supabase project
        run: >-
          supabase link
          --project-ref "$SUPABASE_PROJECT_REF"
          --password "$SUPABASE_DB_PASSWORD"
          --yes

      - name: Compare local and remote migration history
        id: migration-history
        shell: bash
        run: |
          set -euo pipefail
          output_file=$(mktemp)
          for attempt in 1 2 3; do
            if supabase migration list --linked --password "$SUPABASE_DB_PASSWORD" >"$output_file"; then
              cat "$output_file"
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::supabase migration list failed after 3 attempts"
              exit 1
            fi
            sleep $((attempt * 10))
          done

          parsed=$(awk -F'|' '
            /^[[:space:]]*Local[[:space:]]*\|/ { next }
            /-+\|/ { next }
            NF >= 3 {
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", $1)
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", $2)
              if ($1 ~ /^[0-9]+$/ || $2 ~ /^[0-9]+$/) {
                print $1 "\t" $2
              }
            }
          ' "$output_file")
          rm -f "$output_file"

          if [ -z "$parsed" ]; then
            echo "::error::Could not parse Supabase migration history."
            exit 1
          fi

          added_versions=$(git diff --name-only --diff-filter=AR origin/main...HEAD -- 'supabase/migrations/*.sql' \
            | while read -r file; do basename "$file"; done \
            | sed -E 's/^([0-9]+)_.*\.sql$/\1/' \
            | sort -u)

          drift=$(printf '%s\n' "$parsed" | awk -F'\t' -v allowed="$added_versions" '
            BEGIN {
              count = split(allowed, values, /\n/)
              for (index = 1; index <= count; index++) {
                if (values[index] != "") expected[values[index]] = 1
              }
            }
            {
              local_version = $1
              remote_version = $2
              asymmetric = (local_version == "" && remote_version != "") ||
                (local_version != "" && remote_version == "")
              if (!asymmetric) next
              version = local_version != "" ? local_version : remote_version
              if (local_version != "" && remote_version == "" && version in expected) {
                next
              }
              print "  " (local_version == "" ? "<none>" : local_version) \
                " | " (remote_version == "" ? "<none>" : remote_version)
            }
          ')

          if [ -n "$drift" ]; then
            echo "::error::Unexpected Supabase migration history drift detected."
            echo "Local | Remote"
            echo "$drift"
            echo "Do not repair or push from a developer machine. Reconcile the repository receipt in a reviewed PR."
            exit 1
          fi

          echo "No unexpected migration history drift."

      - name: Dry-run remote migration push
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if supabase db push --linked --password "$SUPABASE_DB_PASSWORD" --dry-run; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::supabase db push --dry-run failed after 3 attempts"
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: Write workflow summary
        if: always()
        run: |
          {
            echo "## Supabase migration CI"
            echo
            echo "- Validated migration version IDs and encoding"
            echo "- Compared repository and remote migration history"
            echo "- Ran a linked \`supabase db push --dry-run\`"
            echo
            echo "This workflow never applies a migration."
          } >> "$GITHUB_STEP_SUMMARY"
